services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      SESSION_FOLDER: /app/runtime/sessions
      SESSION_LOCK_DIR: /app/runtime/locks
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    volumes:
      - telegram-sessions:/app/runtime/sessions
      - telegram-locks:/app/runtime/locks
    restart: unless-stopped

volumes:
  telegram-sessions:
  telegram-locks: